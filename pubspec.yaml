name: megamania
description: A modern remake of the Atari classic Megamania, built with Flutter + Flame and Supabase.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.18.0
  flame_audio: ^2.2.0
  supabase_flutter: ^2.6.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  image: ^4.2.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
